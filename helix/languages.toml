[language-server]
lean = { command = "lake", args = ["serve"] }
clangd = { command = "clangd" }
gleam = {command = "gleam",args = ["lsp"]}



[[language]]
name = "qml"
language-servers = ["qmlls"]

[language-server.qmlls]
command = "qmlls"
args = ["-E"]

[[language]]
name = "c-sharp"
scope = "source.cs"
injection-regex = "c-sharp|cs"
file-types = ["cs"]
roots = ["*.sln", "*.csproj"]
language-servers = [ "csharp-ls","omnisharp" ]
indent = { tab-width = 4, unit = "    " }

[language-server.omnisharp]
command = "OmniSharp"
args = ["-lsp"]
# it lags  sometimes because its old so timeout is a good idea
timeout = 60

[[language]]
name = "go"
auto-format = true
# Use goimports for automatic organized imports on save
formatter = { command = "goimports" }

[language-server.gopls.config]
# Enable advanced gopls features
"ui.diagnostic.staticcheck" = true
"formatting.gofumpt" = true
"ui.completion.usePlaceholders" = true
"ui.navigation.importShortcut" = "Both"

[language-server.gopls.config.hints]
# Enable inlay hints (inline type information)
assignVariableTypes = true
compositeLiteralFields = true
compositeLiteralTypes = true
constantValues = true
functionTypeParameters = true
parameterNames = true
rangeVariableTypes = true


[[language]]
name = "rust"
scope = "source.rust"
injection-regex = "rs|rust"
file-types = ["rs"]
roots = ["Cargo.toml", "Cargo.lock"]
shebangs = ["rust-script", "cargo"]
auto-format = true
comment-tokens = ["//", "///", "//!"]
block-comment-tokens = [
  { start = "/*", end = "*/" },
  { start = "/**", end = "*/" },
  { start = "/*!", end = "*/" },
]
language-servers = [ "rust-analyzer" ]
indent = { tab-width = 4, unit = "    " }
persistent-diagnostic-sources = ["rustc", "clippy"]

[language.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'

[language.debugger]
name = "lldb-dap"
transport = "stdio"
command = "lldb-dap"

[[language.debugger.templates]]
name = "binary"
request = "launch"
completion = [ { name = "binary", completion = "filename" } ]
args = { program = "{0}" }

[[language.debugger.templates]]
name = "binary (terminal)"
request = "launch"
completion = [ { name = "binary", completion = "filename" } ]
args = { program = "{0}", runInTerminal = true }

[[language.debugger.templates]]
name = "attach"
request = "attach"
completion = [ "pid" ]
args = { pid = "{0}" }

[[language.debugger.templates]]
name = "gdbserver attach"
request = "attach"
completion = [ { name = "lldb connect url", default = "connect://localhost:3333" }, { name = "file", completion = "filename" }, "pid" ]
args = { attachCommands = [ "platform select remote-gdb-server", "platform connect {0}", "file {1}", "attach {2}" ] }

[[grammar]]
name = "rust"
source = { git = "https://github.com/tree-sitter/tree-sitter-rust", rev = "1f63b33efee17e833e0ea29266dd3d713e27e321" }


[[language]]
name = "c"
scope = "source.c"
injection-regex = "c"
file-types = ["c"] # TODO: ["h"]
